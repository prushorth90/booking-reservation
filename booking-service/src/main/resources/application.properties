spring.application.name=booking-service
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/booking_db}

spring.datasource.username=${DB_USERNAME:postgres}

spring.datasource.password=${DB_PASSWORD:password}

spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true

spring.jpa.properties.hibernate.format_sql=true
app.jwt.secret=${JWT_SECRET:my-super-secret-dev-key-that-is-at-least-32-characters-long}

app.jwt.expiration-ms=86400000
management.endpoints.web.exposure.include=health,info,metrics,prometheus

management.endpoint.health.show-details=always

management.prometheus.metrics.export.enabled=true
spring.application.name=booking-service

management.tracing.sampling.probability=1.0
management.opentelemetry.tracing.export.otlp.endpoint=http://otel-collector:4318/v1/traces