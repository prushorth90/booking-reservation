services:
  postgres:
    image: postgres:16
    container_name: booking-postgres-compose
    environment:
      POSTGRES_DB: booking_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - booking_postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./booking-service
    container_name: booking-backend
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/booking_db
      DB_USERNAME: postgres
      DB_PASSWORD: password
      JWT_SECRET: my-super-secret-dev-key-that-is-at-least-32-characters-long
      APP_ENVIRONMENT: local
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - otel-collector
  frontend:
    build:
      context: ./frontend
    container_name: booking-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

  prometheus:

      image: prom/prometheus:latest

      container_name: booking-prometheus

      ports:

        - "9090:9090"

      volumes:

        - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml

      depends_on:

        - backend

  grafana:

      image: grafana/grafana:latest

      container_name: booking-grafana

      ports:

        - "3000:3000"

      depends_on:

        - prometheus

  otel-collector:

      image: otel/opentelemetry-collector-contrib:latest

      container_name: booking-otel-collector

      command:

        - "--config=/etc/otelcol-contrib/config.yml"

      volumes:

        - ./monitoring/otel-collector-config.yml:/etc/otelcol-contrib/config.yml:ro

      ports:

        - "4317:4317"

        - "4318:4318"

      depends_on:

        - jaeger

  jaeger:

      image: jaegertracing/all-in-one:latest

      container_name: booking-jaeger

      environment:

        COLLECTOR_OTLP_ENABLED: "true"

      ports:

        - "16686:16686"

        - "14250:14250"

volumes:
  booking_postgres_data: